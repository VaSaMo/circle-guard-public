# circleguard-gateway-service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: taller2-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
      - name: gateway-service
        image: gateway-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8087
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: taller2-dev
spec:
  selector:
    app: gateway-service
  ports:
  - port: 8087
    targetPort: 8087
---
