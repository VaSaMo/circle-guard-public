# circleguard-identity-service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: taller2-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
      - name: identity-service
        image: identity-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8083
        env:
        - name: SPRING_DATASOURCE_URL
          value: jdbc:postgresql://postgres:5432/circleguard_identity
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: taller2-dev
spec:
  selector:
    app: identity-service
  ports:
  - port: 8083
    targetPort: 8083
---
